{inc:header.htm}
<div class="layuimini-container">
    <div class="layuimini-main">
        <fieldset class="table-search-fieldset">
            <legend>搜索</legend>
            <div>
                <form class="layui-form layui-form-pane">
                    <div class="layui-form-item">
                        <div class="layui-inline">
                            <label class="layui-form-label">关键词</label>
                            <div class="layui-input-inline">
                                <input placeholder="域名或站点ID" autocomplete="off" type="text" class="layui-input" name="keyword" />
                            </div>
                        </div>
                        <div class="layui-inline">
                            <button type="submit" class="layui-btn layui-btn-primary" lay-submit lay-filter="data-search-btn"><i class="layui-icon"></i> 搜索</button>
                        </div>
                    </div>
                </form>
            </div>
        </fieldset>
        <table class="layui-hide" id="data-table" lay-filter="data-table-filter"></table>
        <script type="text/html" id="currentTableBar">
            <div class="layui-btn-group">
                <a class="layui-btn layui-btn-xs" lay-event="detail">详情</a>
            </div>
        </script>
    </div>
</div>
<script type="text/javascript">
    layui.use(['form','layer', 'table', 'miniTab'], function () {
        var form = layui.form, table = layui.table, miniTab = layui.miniTab;
        table.render({
            elem: '#data-table',
            url: 'index.php?cloud_admin-get_list-',
            height: 'full-145',
            defaultToolbar: ['filter', 'exports', 'print'],
            cellMinWidth: 80,
            escape: false,
            cols: [[
                {field: 'cloud_site_id', width: 250, title: '站点ID'},
                {field: 'domain', minWidth: 180, title: '域名'},
                {field: 'jisucms_version', width: 120, title: 'CMS版本'},
                {field: 'php_version', width: 120, title: 'PHP'},
                {field: 'mysql_version', width: 130, title: 'MySQL'},
                {field: 'theme_active', width: 120, title: '主题'},
                {field: 'connect_count', width: 100, title: '连接次数', align: 'center'},
                {field: 'last_connect_at_text', width: 170, title: '最后连接'},
                {title: '操作', width: 90, toolbar: '#currentTableBar', align: 'center'}
            ]],
            limits: window.adminListLimits || [10, 15, 20, 25, 50, 100],
            limit: window.adminListLimit || 15,
            page: true
        });
        form.on('submit(data-search-btn)', function (data) {
            table.reload('data-table', {page: {curr: 1}, where: {keyword: data.field.keyword}}, 'data');
            return false;
        });
        table.on('tool(data-table-filter)', function (obj) {
            var data = obj.data;
            if (obj.event === 'detail') {
                miniTab.openNewTabByIframe({
                    href: 'index.php?cloud_admin-detail-cloud_site_id-' + data.cloud_site_id,
                    title: '云服务详情'
                });
            }
        });
    });
</script>
</body>
</html>
