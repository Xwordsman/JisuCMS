{inc:header.htm}
<div class="layui-card">
	<div class="layui-card-header">日志文件设置</div>
	<div class="layui-card-body">
		<form id="form" class="layui-form" action="index.php?log-setting-ajax-1" method="post">
			<div class="layui-form-item">
				<label class="layui-form-label required">文件大小</label>
				<div class="layui-input-inline">
					{$input[tool_log_file_max_size]}
				</div>
				<div class="layui-form-mid layui-word-aux">（MB）不建议太大，否则打开日志文件会卡死哦~</div>
			</div>
			<div class="layui-form-item">
				<div class="layui-input-block">
					<button class="layui-btn" lay-submit lay-filter="form">保存</button>
				</div>
			</div>
		</form>
	</div>
</div>

<script type="text/javascript">
	layui.use('form', function(){
		var form = layui.form;

		//监听提交
		form.on('submit(form)', function(){
			adminAjax.submit("#form");
		});
	});
</script>
</body>
</html>
