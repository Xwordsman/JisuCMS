<script type="text/javascript">
(function(){
	if(typeof window.editor_once != 'undefined') return;

	// 获取后台路径
	window.admurl = (function() {
		var url = document.URL || location.href;
		return url.substr(0, url.lastIndexOf("/"));
	})();

	// 获取首页路径
	window.weburl = (function() {
		return admurl.substr(0, admurl.lastIndexOf("/"));
	})();

	window.UEDITOR_HOME_URL = weburl+"/toolcms/plugin/editor_ue/umeditor/";
	loadCss(UEDITOR_HOME_URL+"themes/default/css/ueditor.min.css");
	loadJs(UEDITOR_HOME_URL+"ueditor.config.js", UEDITOR_HOME_URL+"ueditor.all.min.js", UEDITOR_HOME_URL+"lang/zh-cn/zh-cn.js", function(){
		$("#content").removeAttr("class");
        var w = $("input[name='title']").width()+10;
		var ue = UE.getEditor("content", {initialFrameWidth : w, initialFrameHeight:300, serverUrl  : UEDITOR_CONFIG.imageUrl + '{$edit_cid_id}'});

		window.editor_api = {
			content : {
				obj : ue,
				get : function() {
					return this.obj.getContent();
				},
				set : function(s) {
					return this.obj.setContent(s);
				},
				focus : function() {
					return this.obj.focus();
				}
			}
		}
	});
})();
</script>
