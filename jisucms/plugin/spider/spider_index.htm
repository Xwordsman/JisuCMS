{inc:header.htm}
<div class="layuimini-container">
	<div class="layuimini-main">
		<fieldset class="table-search-fieldset">
			<legend>搜索</legend>
			<div>
				<form class="layui-form layui-form-pane">
					<div class="layui-form-item">
						<div class="layui-inline">
							<label class="layui-form-label">蜘蛛分类</label>
							<div class="layui-input-inline">
								{$cidhtml}
							</div>
						</div>
						<div class="layui-inline">
							<button type="submit" class="layui-btn layui-btn-primary"  lay-submit lay-filter="data-search-btn"><i class="layui-icon"></i> 搜 索</button>
						</div>
					</div>
				</form>
			</div>
		</fieldset>
		<script type="text/html" id="toolbar">
			<div class="layui-btn-container">
				<button class="layui-btn layui-btn-sm layui-btn-danger" lay-event="delete">批量删除</button>
				<button class="layui-btn layui-btn-sm layui-btn-warm" lay-event="clear">清空所有</button>
			</div>
		</script>
		<table class="layui-hide" id="data-table" lay-filter="data-table-filter"></table>

		<script type="text/html" id="currentTableBar">
			<a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">删除</a>
		</script>
	</div>
</div>

<script type="text/javascript">
	layui.use(['form','layer', 'table', 'miniTab'], function () {
		var layer = layui.layer, form = layui.form, table = layui.table, miniTab = layui.miniTab;

		table.render({
			elem: '#data-table',
			url: 'index.php?spider-get_list-',
			height: 'full-145',
			toolbar: '#toolbar',
			defaultToolbar: ['filter', 'exports', 'print'],
			cellMinWidth: 50,
			cols: [[
				{type: "checkbox", width: 50, fixed: 'left'},
				{field: 'spidername', width: 100, title: '蜘蛛名称', align: 'center'},
				{field: 'url', title: '抓取链接'},
				{field: 'dateline', width: 170, title: '抓取时间', align: 'center'},
				{field: 'ip', width: 145, title: 'IP', align: "center"},
				{title: '操作', width: 65, toolbar: '#currentTableBar', align: "center"}
			]],
			limits: [10, 15, 20, 25, 50, 100],
			limit: 15,
			page: true
		});
		// 监听搜索操作
		form.on('submit(data-search-btn)', function (data) {
			//执行搜索重载
			table.reload('data-table', {
				page: {
					curr: 1
				}
				, where: {
					spider: data.field.spider
				}
			}, 'data');

			return false;
		});
		/**
		 * toolbar监听事件 table列表 头部的操作
		 */
		table.on('toolbar(data-table-filter)', function (obj) {
			if (obj.event === 'delete') {  // 监听删除操作
				var checkStatus = table.checkStatus('data-table')
						, data = checkStatus.data;
				var len = data.length;
				if(len == 0){
					layer.msg('请选择数据！',{icon:5});
					return false;
				}else{
					layer.confirm('删除不可恢复，确定删除？', function () {
						var id_arr = [];
						for (var i in data) {
							id_arr[i] = data[i]['id'];
						}
						adminAjax.postd("index.php?spider-batch_del-ajax-1", {"id_arr": id_arr});
					});
				}
			}else if (obj.event === 'clear') {
				layer.confirm('不可恢复，确定清空所有记录？', function () {
					adminAjax.postd("index.php?spider-clear-ajax-1", {"do": 1});
				});
			}
		});

		//监听每一行的操作
		table.on('tool(data-table-filter)', function (obj) {
			var data = obj.data;

			if (obj.event === 'delete') {
				layer.confirm('删除不可恢复，确定删除？', function () {
					adminAjax.postd("index.php?spider-del-ajax-1", {"id":data.id});
				});
			}
		});
	});
</script>
</body>
</html>
