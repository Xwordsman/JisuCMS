		/* 页面标题样式 - 紧跟在折叠按钮后面 */
		.layuimini-page-title {
			position: absolute;
			left: 295px; /* Logo宽度235px + 折叠按钮60px，无额外间距 */

			height: 60px;

			z-index: 100;
			white-space: nowrap;
			transition: left 0.2s; /* 添加过渡动画 */
		}
		
		/* 折叠状态下的标题位置 */

			left: 155px; /* 折叠后：折叠按钮在95px，宽度60px，所以155px */
		}
		
		.layuimini-page-title-text {
			display: inline-block;
			max-width: 400px; /* 增加最大宽度以容纳面包屑 */
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			vertical-align: middle;
		}
		
		/* 顶部菜单模式下隐藏页面标题 */

			display: none !important;
		}
		
		/* 深色主题适配 */

		}
		
		/* 浅色主题 */

		}
		
		/* 响应式：小屏幕隐藏 */
		@media screen and (max-width: 768px) {
			.layuimini-page-title {
				display: none !important;
			}
		}
	</style>
</head>

<script src="{$C[admin_static]}layui/js/lay-config.js?v=2.0.0" charset="utf-8"></script>
<script type="text/javascript">
	layui.use(['jquery', 'layer', 'miniAdmin'], function () {
		var $ = layui.jquery,layer = layui.layer,miniAdmin = layui.miniAdmin;
		var admin_layout = "{$cfg[admin_layout]}";
		if(admin_layout == 1){
			var multiModule = true;
		}else{
			var multiModule = false;
		}
		var options = {
			iniUrl: "index.php?admin-init_navigation",
			urlHashLocation: false,
			bgColorDefault: false,
			multiModule: multiModule,
			menuChildOpen: false,
			loadingTime: 0,
			pageAnim: false,
			maxTabNum: 20
		};
		miniAdmin.render(options);

		// 更新页面标题函数
		function updatePageTitle() {
			setTimeout(function(){
				var $activeTab = $('.layui-tab-title li.layui-this');
				var title = '';
				
				// 获取标签页文本
				if ($activeTab.length > 0) {
					// 克隆元素并移除关闭按钮，只获取文本
					var $clone = $activeTab.clone();
					$clone.find('.layui-tab-close').remove();
					title = $clone.text().trim();
				}
				
				// 如果没有标题或是首页，显示"首页"
				if (!title || title === '' || $activeTab.attr('id') === 'layuiminiHomeTabId') {
					title = '首页';
				} else {
					// 尝试获取当前激活的菜单项，构建面包屑
					var $activeMenu = $('.layuimini-menu-left .layui-nav-item.layui-nav-itemed .layui-nav-child dd.layui-this');
					if ($activeMenu.length === 0) {
						// 如果没有找到二级菜单，尝试找一级菜单
						$activeMenu = $('.layuimini-menu-left .layui-nav-item.layui-this');
					}
					
					if ($activeMenu.length > 0) {
						// 获取一级菜单名称
						var $parentMenu = $activeMenu.closest('.layui-nav-item');
						var parentTitle = '';
						if ($parentMenu.length > 0) {
							var $parentLink = $parentMenu.children('a').first().clone();
							$parentLink.find('.layui-nav-more').remove();
							parentTitle = $parentLink.text().trim();
						}
						
						// 如果有一级菜单且不是首页，显示面包屑
						if (parentTitle && parentTitle !== title) {
							title = parentTitle + ' / ' + title;
						}
					}
				}
				
				$('.layuimini-page-title-text').text(title);
				
				// 确保标题容器可见（仅在左侧菜单模式）
				if (admin_layout == 0) {
					$('.layuimini-page-title').show();
				}
			}, 200);
		}

		// 监听标签页切换
		layui.element.on('tab(layuiminiTab)', function(data){
			updatePageTitle();
		});

		// 初始化时设置首页标题
		setTimeout(function(){
			updatePageTitle();
		}, 500);

		// 监听新标签页打开（使用事件委托）
		$(document).on('click', '[layuimini-content-href], .layui-nav-item a', function(){
			updatePageTitle();
		});

		// 监听标签页关闭
		$(document).on('click', '.layui-tab-close', function(){
			setTimeout(function(){
				updatePageTitle();
			}, 100);
		});

		// 实现左侧菜单手风琴效果
		if(admin_layout == 0) {
			$(document).on('click', '.layuimini-menu-left .layui-nav .layui-nav-item > a', function(){
				var $this = $(this);
				var $parent = $this.parent();
				var $siblings = $parent.siblings('.layui-nav-item');
				
				// 如果当前菜单有子菜单
				if($parent.find('.layui-nav-child').length > 0) {
					// 收起其他已展开的菜单
					$siblings.each(function(){
						if($(this).hasClass('layui-nav-itemed')) {
							$(this).removeClass('layui-nav-itemed');
						}
					});
				}
			});
		}

		$('.login-out').on("click", function () {
			$.post("index.php?index-logout-ajax-1",{do: 1},function(res){
				var login_url = res.login_url;
				layer.msg('{lang:logout_successfully}',{icon: 1}, function () {
					window.location = login_url;
				});
			},'json');
		});

		// 清除缓存
		$('.clear-cache-btn').on("click", function () {
			layer.confirm('{lang:clear_cache_confirm}', {
				icon: 3,
				title: '{lang:tips}',
				btn: ['{lang:confirm}', '{lang:cancel}']
			}, function(index){
				layer.close(index);
				var loadIndex = layer.load(1, {shade: [0.3, '#000']});
				$.post("index.php?tool-index-ajax-1", {
					dbcache: 1,
					filecache: 1
				}, function(res){
					layer.close(loadIndex);
					if(res.err == 0){
						layer.msg(res.msg || '{lang:clear_cache_success}', {icon: 1, time: 1500}, function(){
							location.reload();
						});
					} else {
						layer.msg(res.msg || '{lang:clear_cache_failed}', {icon: 5});
					}
				}, 'json').fail(function(){
					layer.close(loadIndex);
					layer.msg('{lang:request_exception}', {icon: 5});
				});
			});
		});
	});
</script>
</body>
